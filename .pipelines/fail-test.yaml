# Goal: pipeline reaches test stage but fails due to an intentionally failing test.
pipeline:
  name: java-test-failure

stages:
  - build
  - test

compile:
  stage: build
  image: eclipse-temurin:17
  script: scripts/compile.sh

failing-tests:
  stage: test
  image: eclipse-temurin:17
  script: scripts/test-failing.sh